<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>添加微信</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#07c160,#06ad56);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  padding:20px;
}
.card{
  width:100%;max-width:360px;
  background:#fff;
  border-radius:20px;
  padding:40px 30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.avatar{
  width:80px;height:80px;
  background:linear-gradient(135deg,#07c160,#06ad56);
  border-radius:50%;
  margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;color:#fff;
}
.wechat-icon{font-size:48px;margin-bottom:8px}
h2{font-size:22px;color:#333;margin-bottom:6px}
.sub{font-size:14px;color:#999;margin-bottom:24px}
.wechat-id{
  display:inline-block;
  background:#f5f5f5;
  border:2px dashed #07c160;
  border-radius:12px;
  padding:16px 28px;
  font-size:24px;
  font-weight:700;
  color:#07c160;
  letter-spacing:2px;
  margin-bottom:8px;
}
.hint{font-size:13px;color:#999;margin-bottom:24px}
.btn{
  display:block;width:100%;
  background:linear-gradient(135deg,#07c160,#06ad56);
  color:#fff;border:none;
  border-radius:12px;
  padding:16px;font-size:18px;font-weight:600;
  cursor:pointer;
  transition:transform .1s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(7,193,96,.3);
}
.btn:active{transform:scale(.97)}
.btn.copied{background:#999;box-shadow:none}
.footer{margin-top:20px;font-size:12px;color:#bbb}
</style>
</head>
<body>
<div class="card">
  <div class="avatar">💬</div>
  <h2>添加我的微信</h2>
  <p class="sub">长按复制下方微信号</p>

  <div class="wechat-id" id="wxid">19133838878</div>
  <p class="hint">微信号 · 点击按钮复制</p>

  <button class="btn" id="copyBtn" onclick="copyWx()">复制微信号</button>

  <p class="footer">打开微信 → 添加朋友 → 粘贴搜索</p>
</div>

<script>
function copyWx(){
  const btn=document.getElementById('copyBtn');
  const wxid='19133838878';
  navigator.clipboard.writeText(wxid).then(()=>{
    btn.textContent='已复制，去微信添加';
    btn.classList.add('copied');
    setTimeout(()=>{
      btn.textContent='复制微信号';
      btn.classList.remove('copied');
    },2000);
  }).catch(()=>{
    // Fallback for older browsers
    const ta=document.createElement('textarea');
    ta.value=wxid;
    ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='已复制，去微信添加';
    btn.classList.add('copied');
    setTimeout(()=>{
      btn.textContent='复制微信号';
      btn.classList.remove('copied');
    },2000);
  });
}
</script>
</body>
</html>

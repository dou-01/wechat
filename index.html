<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>联系方式</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#2c3e50,#3498db);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  padding:20px;
}
.card{
  width:100%;max-width:360px;
  background:#fff;
  border-radius:20px;
  padding:40px 30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.icon{
  width:80px;height:80px;
  background:linear-gradient(135deg,#2c3e50,#3498db);
  border-radius:50%;
  margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;color:#fff;
}
h2{font-size:22px;color:#333;margin-bottom:6px}
.sub{font-size:14px;color:#999;margin-bottom:24px}
.id-box{
  display:inline-block;
  background:#f5f5f5;
  border:2px dashed #3498db;
  border-radius:12px;
  padding:16px 28px;
  font-size:24px;
  font-weight:700;
  color:#3498db;
  letter-spacing:2px;
  margin-bottom:8px;
}
.hint{font-size:13px;color:#999;margin-bottom:24px}
.btn{
  display:block;width:100%;
  background:linear-gradient(135deg,#2c3e50,#3498db);
  color:#fff;border:none;
  border-radius:12px;
  padding:16px;font-size:18px;font-weight:600;
  cursor:pointer;
  transition:transform .1s;
  box-shadow:0 4px 16px rgba(52,152,219,.3);
}
.btn:active{transform:scale(.97)}
.btn.copied{background:#95a5a6;box-shadow:none}
.footer{margin-top:20px;font-size:12px;color:#bbb}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📞</div>
  <h2>联系我</h2>
  <p class="sub">点击复制下方号码</p>

  <div class="id-box" id="contactId">19133838878</div>
  <p class="hint">业务咨询 · 长按或点击复制</p>

  <button class="btn" id="copyBtn" onclick="copyId()">复制号码</button>

  <p class="footer">打开绿色软件，粘贴搜索即可添加</p>
</div>

<script>
function copyId(){
  const btn=document.getElementById('copyBtn');
  const id='19133838878';
  navigator.clipboard.writeText(id).then(()=>{
    btn.textContent='已复制 ✓';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='复制号码';btn.classList.remove('copied');},2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=id;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='已复制 ✓';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='复制号码';btn.classList.remove('copied');},2000);
  });
}
</script>
</body>
</html>
